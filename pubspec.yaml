name: dart_dash_otp
description: >-
  Generate and verify TOTP and HOTP one-time passwords (RFC 6238 / RFC 4226)
  for 2FA and MFA, with otpauth:// URIs compatible with Google Authenticator.
version: 2.0.0
homepage: https://github.com/baldomerocho/dart_dash_otp
repository: https://github.com/baldomerocho/dart_dash_otp
issue_tracker: https://github.com/baldomerocho/dart_dash_otp/issues
documentation: https://github.com/baldomerocho/dart_dash_otp/tree/master/doc
topics:
  - otp
  - totp
  - hotp
  - authentication
  - two-factor-authentication

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  crypto: ^3.0.3
  base32: ^2.1.3

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0
